<!doctype html>
<html lang="pt">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nuxsum | AI Text Summarizer</title>
  <meta property="og:title" content="Nuxsum - Summarize Text Instantly with AI">
  <meta property="og:description" content="Paste any long text and get a clean AI-powered summary in seconds.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://nuxsum.vercel.app">
  <meta property="og:image" content="https://nuxsum.vercel.app/assets/og-image.png">
  <link rel="stylesheet" href="index.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="icon" href="./assets/">
</head>

<body>
  <div id="toast" class="toast"></div>

  <div class="app-layout">
    <aside class="ad-sidebar ad-sidebar-left">
      <div class="ad-box"></div>
    </aside>

    <div class="app-shell">
      <header class="app-header padding-base margin-bottom-l">
        <div class="header-inner">
          <div class="display-flex align-center">

            <div class="display-flex align-center gap8">
              <img src="./assets/logo.png" class="logo-icon" alt="Nuxsum logo">
              <span class="font-bold">Nuxsum</span>
            </div>

            <div class="language-dropdown">

              <button id="languageToggle" class="language-toggle" type="button">
                <i data-lucide="languages" class="flag-icon"></i>
              </button>

              <div id="languageMenu" class="language-menu hidden">

                <button class="language-option" data-lang="en-US" type="button">
                  <span class="flag-emoji">EN</span>
                  <img src="./assets/flag-usa.svg" alt="English" class="flag-icon">
                </button>

                <button class="language-option" data-lang="pt-PT" type="button">
                  <span class="flag-emoji">PT</span>
                  <img src="./assets/flag-portugal.svg" alt="Português" class="flag-icon">
                </button>

                <button class="language-option" data-lang="id-ID" type="button">
                  <span class="flag-emoji">ID</span>
                  <img src="./assets/flag-indo.svg" alt="Bahasa Indonesia" class="flag-icon">
                </button>

                <button class="language-option" data-lang="zh-CN" type="button">
                  <span class="flag-emoji">CN</span>
                  <img src="./assets/flag-china.svg" alt="中文" class="flag-icon">
                </button>

              </div>

            </div>

          </div>
        </div>
      </header>

      <main class="padding-l">

        <!-- HERO -->
        <section class="margin-bottom-l">
          <div class="tight-line margin-bottom-l">
            <span data-i18n="title1" class="text-xl font-bold">
              Sumarize any text
            </span><br>

            <span data-i18n="title2" class="text-xl font-bold text-primary hero-title">
              into its essence.
            </span>
          </div>

          <label data-i18n="subtitle" for="inputText" class="font-light text-opacity-50">
            Paste a wall of text. Pick your length. Get a clean summary in seconds.
          </label>
        </section>

        <!-- TEXT INPUT -->
        <section class="margin-bottom-l">
          <div class="relative">
            <textarea id="inputText" data-i18n-placeholder="placeholder"
              placeholder="Paste the text here..."></textarea>

            <button id="btnMic" type="button" class="mic-ondiv">
              <i data-lucide="mic"></i>
            </button>
          </div>

          <div id="charCounter" class="fill text-opacity-50 margin-bottom-l"></div>
        </section>

        <!-- SUMMARY LENGTH -->
        <section class="margin-bottom-l">

          <div data-i18n="summaryLength" class="margin-bottom-m text-opacity-50">
            SUMMARY LENGTH
          </div>

          <div id="summary-size-group" class="display-flex gap16 summary-size-container">

            <div data-size="size-short" class="summary-size-card">
              <i data-lucide="zap"></i>

              <div data-i18n="short">short</div>

              <div data-i18n="shortDesc" class="font-light text-opacity-50">
                2-3 sentences
              </div>
            </div>

            <div data-size="size-medium" class="summary-size-card">
              <i data-lucide="align-left"></i>

              <div data-i18n="medium">medium</div>

              <div data-i18n="mediumDesc" class="font-light text-opacity-50">
                solid paragraph
              </div>
            </div>

            <div data-size="size-long" class="summary-size-card">
              <i data-lucide="file-text"></i>

              <div data-i18n="long">long</div>

              <div data-i18n="longDesc" class="font-light text-opacity-50">
                detailed summary
              </div>
            </div>

          </div>

          <div class="text-center margin-top-l">
            <button id="btnSummarize" class="resume-button">
              <span id="btnSummarizeText" data-i18n="summarize">Summarize</span>
              <span class="margin-left-m" data-lucide="arrow-right"></span>
            </button>
          </div>

        </section>

        <!-- RESULT -->
        <section>

          <h2 data-i18n="result">
            Result
          </h2>

          <div class="output-container">
            <div id="copyIconWrapper" class="output-copy-button pointer" type="button" aria-label="Copy summary">
              <i data-lucide="clipboard"></i>
            </div>

            <div id="output" class="output-text"></div>
          </div>

        </section>
        

      </main>

      <footer class="footer">
        <div class="footer-inner">
          <a href="./about.html">About</a>
          <a href="./privacy-policy.html">Privacy</a>
          <a href="./terms.html">Terms</a>
          <a href="./contact.html">Contact</a>
        </div>
      </footer>

    </div>

    <aside class="ad-sidebar ad-sidebar-right">
      <div class="ad-box"></div>
    </aside>

  </div>

  <script src="./translations.js"></script>
  <script src="./app.js"></script>

</body>

</html>
