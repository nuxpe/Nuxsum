<!doctype html>
<html lang="pt">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nuxsum</title>
  <meta name="description"
    content="Summarize long texts instantly with AI. Paste your text and get a clean summary in seconds.">
  <link rel="stylesheet" href="index.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div id="toast" class="toast"></div>

  <div class="app-layout">
    <aside class="ad-sidebar ad-sidebar-left">
      <div class="ad-box">
        <!-- Ad esquerda -->
      </div>
    </aside>

    <div class="app-shell">
      <header class="app-header padding-base margin-bottom-l">
        <div class="header-inner">
          <div class="display-flex align-center gap8">
            <img src="./assets/logo.png" class="logo-icon" alt="Nuxsum logo">
            <span class="font-bold">Nuxsum</span>
          </div>
        </div>
      </header>

      <main class="padding-l">
        <section class="margin-bottom-l">
          <div class="tight-line margin-bottom-l">
            <span class="text-xl font-bold">Distill any text</span><br>
            <span class="text-xl font-bold text-primary hero-title">into its essence.</span>
          </div>

          <label for="inputText" class="font-light text-opacity-50">
            Paste a wall of text. Pick your length. Get a clean summary in seconds.
          </label>
        </section>

        <section class="margin-bottom-l">
          <div class="relative">
            <textarea id="inputText" placeholder="Paste the text here..."></textarea>
            <i id="btnMic" data-lucide="mic" class="mic-ondiv"></i>
          </div>

          <div id="charCounter" class="fill text-opacity-50 margin-bottom-l"></div>
        </section>

        <section class="margin-bottom-l">
          <div class="margin-bottom-m text-opacity-50">SUMMARY LENGTH</div>

          <div id="summary-size-group" class="display-flex gap16 summary-size-container">
            <div data-size="size-short" class="summary-size-card">
              <i data-lucide="zap"></i>
              <div>short</div>
              <div class="font-light text-opacity-50">2-3 sentences</div>
            </div>

            <div data-size="size-medium" class="summary-size-card">
              <i data-lucide="align-left"></i>
              <div>medium</div>
              <div class="font-light text-opacity-50">solid paragraph</div>
            </div>

            <div data-size="size-long" class="summary-size-card">
              <i data-lucide="file-text"></i>
              <div>long</div>
              <div class="font-light text-opacity-50">detailed summary</div>
            </div>
          </div>

          <div class="text-center margin-top-l">
            <button id="btnSummarize" class="resume-button">
              <span id="btnSummarizeText">Summarize</span>
              <span class="margin-left-m" data-lucide="arrow-right"></span>
            </button>
          </div>
        </section>

        <section>
          <h2>Result</h2>

          <div class="output-container">
            <div id="copyIconWrapper" class="output-copy-button pointer" type="button" aria-label="Copy summary">
              <i data-lucide="clipboard"></i>
            </div>

            <div id="output" class="output-text"></div>
          </div>
        </section>
      </main>
      <footer class="footer">
  <div class="footer-inner">
    <a href="./about.html">About</a>
    <a href="./privacy-policy.html">Privacy</a>
    <a href="./terms.html">Terms</a>
    <a href="./contact.html">Contact</a>
  </div>
</footer>
    </div>

    <aside class="ad-sidebar ad-sidebar-right">
      <div class="ad-box">

      </div>
    </aside>
  </div>
<script src="./app.js"></script>
</body>

</html>
